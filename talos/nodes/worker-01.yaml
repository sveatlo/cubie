---
# Per-node patch for worker node worker-01.
# EDIT: set hostname, IP address, and install disk to match your hardware.
machine:
  network:
    hostname: worker-01
    interfaces:
      - interface: eth0
        addresses:
          - 192.168.1.61/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
        dhcp: false
  install:
    disk: /dev/sda
    wipe: false
