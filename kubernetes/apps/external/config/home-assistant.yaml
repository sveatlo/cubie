---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant
  namespace: external
spec:
  type: ExternalName
  externalName: 10.69.10.20
  ports:
    - port: 8123
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home-assistant
  namespace: external
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`assistant.mirkwood.casa`)
      kind: Rule
      services:
        - name: home-assistant
          port: 8123
  tls: {}
