---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant
  namespace: external
spec:
  ports:
    - port: 8123
---
apiVersion: v1
kind: Endpoints
metadata:
  name: home-assistant
  namespace: external
subsets:
  - addresses:
      - ip: 10.69.10.20
    ports:
      - port: 8123
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: home-assistant
  namespace: external
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - assistant.mirkwood.casa
  rules:
    - host: assistant.mirkwood.casa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: home-assistant
                port:
                  number: 8123
