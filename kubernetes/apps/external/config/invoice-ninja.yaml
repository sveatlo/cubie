---
apiVersion: v1
kind: Service
metadata:
  name: invoice-ninja
  namespace: external
spec:
  ports:
    - port: 3000
---
apiVersion: v1
kind: Endpoints
metadata:
  name: invoice-ninja
  namespace: external
subsets:
  - addresses:
      - ip: 10.69.10.4
    ports:
      - port: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: invoice-ninja
  namespace: external
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - invoices.mirkwood.casa
  rules:
    - host: invoices.mirkwood.casa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: invoice-ninja
                port:
                  number: 3000
