---
apiVersion: v1
kind: Service
metadata:
  name: invoice-ninja
  namespace: external
spec:
  ports:
    - port: 3000
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: invoice-ninja
  namespace: external
  labels:
    kubernetes.io/service-name: invoice-ninja
addressType: IPv4
endpoints:
  - addresses:
      - 10.69.10.4
ports:
  - port: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: invoice-ninja
  namespace: external
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - invoices.mirkwood.casa
  rules:
    - host: invoices.mirkwood.casa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: invoice-ninja
                port:
                  number: 3000
