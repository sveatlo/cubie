---
# ServersTransport to skip TLS verification for the NAS self-signed cert
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: nas-insecure
  namespace: external
spec:
  insecureSkipVerify: true
---
apiVersion: v1
kind: Service
metadata:
  name: nas
  namespace: external
  annotations:
    traefik.ingress.kubernetes.io/service.serversscheme: https
    traefik.ingress.kubernetes.io/service.serverstransport: external-nas-insecure@kubernetescrd
spec:
  ports:
    - port: 444
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: nas
  namespace: external
  labels:
    kubernetes.io/service-name: nas
addressType: IPv4
endpoints:
  - addresses:
      - 10.69.10.3
ports:
  - port: 444
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nas
  namespace: external
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: traefik-lan-only@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - nas.mirkwood.casa
  rules:
    - host: nas.mirkwood.casa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nas
                port:
                  number: 444
