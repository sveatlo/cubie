---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: external
spec:
  type: ExternalName
  externalName: 10.69.10.3
  ports:
    - port: 30013
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin
  namespace: external
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`play.mirkwood.casa`)
      kind: Rule
      services:
        - name: jellyfin
          port: 30013
  tls: {}
