---
controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/mealie-recipes/mealie
          tag: v3.16.0
          pullPolicy: IfNotPresent
        env:
          TZ: UTC
          DB_ENGINE: postgres
          BASE_URL: https://recipes.mirkwood.casa
          POSTGRES_USER: mealie
          POSTGRES_SERVER: mealie-db-rw
          POSTGRES_PORT: "5432"
          POSTGRES_DB: mealie
          POSTGRES_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: mealie-db-app
                key: password
        envFrom:
          - secretRef:
              name: mealie-secret

service:
  main:
    controller: main
    ports:
      http:
        port: 9000

ingress:
  main:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - host: recipes.mirkwood.casa
        paths:
          - path: /
            pathType: Prefix

persistence:
  data:
    enabled: true
    storageClass: nfs
    accessMode: ReadWriteOnce
    size: 10Gi
    advancedMounts:
      main:
        main:
          - path: /app/data/
