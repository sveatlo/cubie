---
controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/pennydreadful/bookshelf
          tag: hardcover-v0.4.20.129
        env:
          TZ: UTC
          PUID: "1000"
          PGID: "1000"

service:
  main:
    controller: main
    ports:
      http:
        port: 8787

ingress:
  main:
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.middlewares: traefik-lan-only@kubernetescrd
    hosts:
      - host: bookshelf.mirkwood.casa
        paths:
          - path: /
            service:
              identifier: main
              port: http

persistence:
  config:
    type: persistentVolumeClaim
    storageClass: nfs
    accessMode: ReadWriteOnce
    size: 2Gi
    globalMounts:
      - path: /config
  media:
    type: nfs
    server: 10.69.10.3
    path: /mnt/tank/media
    globalMounts:
      - path: /media
