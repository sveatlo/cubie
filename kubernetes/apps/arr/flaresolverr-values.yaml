---
controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/flaresolverr/flaresolverr
          tag: v3.4.6
        env:
          TZ: UTC
          LOG_LEVEL: info

service:
  main:
    controller: main
    ports:
      http:
        port: 8191

ingress:
  main:
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.middlewares: traefik-lan-only@kubernetescrd
    hosts:
      - host: flaresolverr.mirkwood.casa
        paths:
          - path: /
            service:
              identifier: main
              port: http

persistence:
  config:
    type: persistentVolumeClaim
    storageClass: nfs
    accessMode: ReadWriteOnce
    size: 1Gi
    globalMounts:
      - path: /config
  media:
    type: nfs
    server: 10.69.10.3
    path: /mnt/tank/media
    globalMounts:
      - path: /media
