---
controllers:
  main:
    initContainers:
      init-permissions:
        image:
          repository: busybox
          tag: latest
        command:
          - sh
          - -c
          - chown -R 1000:1000 /config
        securityContext:
          runAsUser: 0

    containers:
      main:
        image:
          repository: ghcr.io/kkodecs/livrarr
          tag: 0.1.0-alpha3
        env:
          TZ: UTC

service:
  main:
    controller: main
    ports:
      http:
        port: 8789

ingress:
  main:
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.middlewares: traefik-lan-only@kubernetescrd
    hosts:
      - host: livrarr.mirkwood.casa
        paths:
          - path: /
            service:
              identifier: main
              port: http

persistence:
  config:
    type: persistentVolumeClaim
    storageClass: nfs
    accessMode: ReadWriteOnce
    size: 2Gi
    globalMounts:
      - path: /config
  media:
    type: nfs
    server: 10.69.10.3
    path: /mnt/tank/media
    globalMounts:
      - path: /media
