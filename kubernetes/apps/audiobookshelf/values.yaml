---
controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/advplyr/audiobookshelf
          tag: "2.33.1"
        env:
          TZ: UTC

service:
  main:
    controller: main
    ports:
      http:
        port: 80

ingress:
  main:
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - host: abs.mirkwood.casa
        paths:
          - path: /
            service:
              identifier: main
              port: http

persistence:
  config:
    type: persistentVolumeClaim
    storageClass: nfs
    accessMode: ReadWriteOnce
    size: 1Gi
    globalMounts:
      - path: /config
  metadata:
    type: persistentVolumeClaim
    storageClass: nfs
    accessMode: ReadWriteOnce
    size: 1Gi
    globalMounts:
      - path: /metadata
  audiobooks:
    type: nfs
    server: 10.69.10.3
    path: "/mnt/tank/media/Audio/Audio Books"
    globalMounts:
      - path: /audiobooks
  books:
    type: nfs
    server: 10.69.10.3
    path: "/mnt/tank/media/E-books"
    globalMounts:
      - path: /books
