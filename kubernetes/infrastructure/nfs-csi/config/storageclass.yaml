---
# NFS StorageClass — used by PersistentVolumeClaims across the cluster.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: nfs.csi.k8s.io
parameters:
  server: 10.69.10.3
  share: /mnt/rapida/cubie
  mountPermissions: "0777"
reclaimPolicy: Retain # Retain PV data when PVC is deleted
volumeBindingMode: Immediate
allowVolumeExpansion: true
mountOptions:
  - nfsvers=4.1
  - hard
  - nointr
  - noatime
