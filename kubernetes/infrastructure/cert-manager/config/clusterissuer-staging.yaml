---
# cert-manager ClusterIssuer — Let's Encrypt STAGING (for testing, not trusted by browsers).
# Use this first to verify DNS-01 challenge works before switching to prod.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: svatopluk@vunder.io
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          route53:
            region: us-east-1
            # hostedZoneID: REPLACE_ZONE_ID
            accessKeyID: AKIAQBO2UYKHIJI6ZM74
            secretAccessKeySecretRef:
              name: route53-credentials
              key: secret-access-key
