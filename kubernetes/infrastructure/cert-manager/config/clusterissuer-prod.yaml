---
# cert-manager ClusterIssuer — Let's Encrypt PRODUCTION (trusted certs, rate-limited).
# Only switch to this after staging works successfully.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: svatopluk@vunder.io
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          route53:
            region: us-east-1
            # hostedZoneID: REPLACE_ZONE_ID
            accessKeyID: AKIAQBO2UYKHIJI6ZM74
            secretAccessKeySecretRef:
              name: route53-credentials
              key: secret-access-key
