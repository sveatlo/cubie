---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cert-manager

helmCharts:
  - name: cert-manager
    repo: https://charts.jetstack.io
    version: "v1.20.2"
    releaseName: cert-manager
    namespace: cert-manager
    valuesFile: values.yaml

resources:
  - ./config/clusterissuer-staging.yaml
  - ./config/clusterissuer-prod.yaml
  - ./config/cert-manager-alerts.yaml

configMapGenerator:
  - name: grafana-dashboard-cert-manager
    namespace: cert-manager
    options:
      labels:
        grafana_dashboard: "1"
    files:
      - dashboards/cert-manager.json
