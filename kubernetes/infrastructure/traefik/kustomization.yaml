---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: traefik

helmCharts:
  - name: traefik
    repo: https://helm.traefik.io/traefik
    version: "39.0.7"
    releaseName: traefik
    namespace: traefik
    valuesFile: values.yaml
    includeCRDs: true

resources:
  - config/wildcard-cert.yaml
  - config/default-tls.yaml
  - config/tls-option.yaml
  - config/middleware-lan-only.yaml
  - config/traefik-alerts.yaml

configMapGenerator:
  - name: grafana-dashboard-traefik
    namespace: traefik
    options:
      labels:
        grafana_dashboard: "1"
    files:
      - dashboards/traefik.json
