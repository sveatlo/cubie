---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: traefik

helmCharts:
  - name: traefik
    repo: https://helm.traefik.io/traefik
    version: "28.3.0"
    releaseName: traefik
    namespace: traefik
    valuesFile: values.yaml
    includeCRDs: true

resources:
  - config/wildcard-cert.yaml
  - config/default-tls.yaml
  - config/tls-option.yaml
