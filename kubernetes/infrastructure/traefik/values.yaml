---
deployment:
  replicas: 1

service:
  type: LoadBalancer
  annotations:
    # MetalLB annotation: pin to specific IP if desired, or remove to auto-assign.
    metallb.universe.tf/loadBalancerIPs: "10.69.11.42"
  spec:
    externalTrafficPolicy: Local

ports:
  web:
    port: 8000
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    port: 8443

ingressRoute:
  dashboard:
    enabled: true

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
    allowExternalNameServices: true

logs:
  general:
    level: INFO
  access:
    enabled: true

metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
    addRoutersLabels: true

extraObjects:
  - apiVersion: v1
    kind: Service
    metadata:
      name: traefik-metrics
      namespace: traefik
      labels:
        app.kubernetes.io/name: traefik
    spec:
      selector:
        app.kubernetes.io/instance: traefik-traefik
        app.kubernetes.io/name: traefik
      ports:
        - name: metrics
          port: 9100
          targetPort: metrics
          protocol: TCP
      type: ClusterIP
