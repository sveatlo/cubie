---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cnpg-system

resources:
  - config/namespace.yaml

helmCharts:
  - name: cloudnative-pg
    repo: https://cloudnative-pg.github.io/charts
    version: "0.28.0"
    releaseName: cnpg
    namespace: cnpg-system
    valuesFile: values.yaml
    includeCRDs: true
